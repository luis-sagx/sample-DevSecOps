name: DevSecOps Demo Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:

  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — CI: Build + Tests unitarios
  # Propósito: Validar que el código compila y la lógica funciona.
  # ═══════════════════════════════════════════════════════════════
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — SEC: Escaneo de seguridad (SCA + SAST + Secrets)
  # Propósito: Gate de seguridad que bloquea el deploy si hay
  #            vulnerabilidades altas en dependencias, patrones
  #            inseguros en código, o secretos expuestos.
  # ═══════════════════════════════════════════════════════════════
  security_scan:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- SCA: Software Composition Analysis ---
      # Detecta CVEs conocidos en dependencias (lodash, etc.)
      - name: "SCA: Dependency audit (npm audit)"
        run: npm audit --audit-level=high

      # --- Secret Scanning ---
      # Detecta API keys, tokens, contraseñas hardcodeadas en el código
      - name: "Secrets: Install Gitleaks"
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          chmod +x gitleaks

      - name: "Secrets: Scan for hardcoded secrets"
        run: ./gitleaks detect --source . --no-git --verbose --config .gitleaks.toml

      # --- SAST: Static Application Security Testing ---
      # Analiza el código fuente buscando patrones inseguros
      # (inyección, eval, prototype pollution, etc.)
      - name: "SAST: Install Semgrep"
        run: pip install semgrep

      - name: "SAST: Scan source code"
        run: semgrep scan --config=auto --error --severity ERROR src/

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — CD: Deploy a GitHub Pages
  # Propósito: Solo se ejecuta si CI + SEC pasaron en main.
  #            Principio: nunca desplegar código inseguro.
  # ═══════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
